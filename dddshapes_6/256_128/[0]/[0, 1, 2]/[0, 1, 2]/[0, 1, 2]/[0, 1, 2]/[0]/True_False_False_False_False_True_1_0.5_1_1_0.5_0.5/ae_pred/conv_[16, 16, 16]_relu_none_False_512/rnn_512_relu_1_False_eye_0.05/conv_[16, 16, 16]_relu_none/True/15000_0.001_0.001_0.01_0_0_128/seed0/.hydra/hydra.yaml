hydra:
  run:
    dir: revieww/contextual_${support_type}_${support_connectivity}_${subsample_contexts_ratio}/${dataset.name}/${model.name}/${encoder.name}/${rnn.name}/${decoder.name}/${one_context_per_batch}/${train_loop.num_steps}_${train_loop.pretrain_lr}_${train_loop.pretrain_decay}_${train_loop.pretrain_act_decay}_${train_loop.pretrain_act_l1}_${train_loop.pretrain_weight_l1}_${train_loop.batch_size}/seed${seed}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - compute_metrics=True
    - compute_clustering=True
    - train_loop.num_steps=15000
    - train_loop.eval_every=1000
    - train_loop.compute_metrics_every=1000
    - train_loop.make_plots_every=1000
    - dataset=dddshapes
    - dataset.next_shape_offset=[0,1,2]
    - dataset.next_wall_offset=[0,1,2]
    - dataset.next_object_offset=[0,1,2]
    - model=rnnae
    - model.type=pred
    - rnn.noise=0.05
    - encoder.hidden_dims=[16,16,16]
    - decoder.hidden_dims=[16,16,16]
    - train_loop.pretrain_decay=0.001
    - train_loop.pretrain_act_decay=0.01
    - train_loop.pretrain_weight_l1=0
    - train_loop.pretrain_act_l1=0
    - encoder.output_dim=512
    - rnn.hidden_dim=512
    - train_loop.batch_size=128
    - seed=0
  job:
    name: train_rnn
    chdir: null
    override_dirname: compute_clustering=True,compute_metrics=True,dataset.next_object_offset=[0,1,2],dataset.next_shape_offset=[0,1,2],dataset.next_wall_offset=[0,1,2],dataset=dddshapes,decoder.hidden_dims=[16,16,16],encoder.hidden_dims=[16,16,16],encoder.output_dim=512,model.type=pred,model=rnnae,rnn.hidden_dim=512,rnn.noise=0.05,seed=0,train_loop.batch_size=128,train_loop.compute_metrics_every=1000,train_loop.eval_every=1000,train_loop.make_plots_every=1000,train_loop.num_steps=15000,train_loop.pretrain_act_decay=0.01,train_loop.pretrain_act_l1=0,train_loop.pretrain_decay=0.001,train_loop.pretrain_weight_l1=0
    id: ???
    num: ???
    config_name: train_rnn
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.1'
    cwd: /home/ghb24/paper_git/er/comp_predictive_learning
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/ghb24/paper_git/er/comp_predictive_learning/scripts/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/ghb24/paper_git/er/comp_predictive_learning/revieww/contextual_full_1_0.8/dddshapes_6/256_128/[0]/[0,
      1, 2]/[0, 1, 2]/[0, 1, 2]/[0, 1, 2]/[0]/True_False_False_False_False_True_1_0.5_1_1_0.5_0.5/ae_pred/conv_[16,
      16, 16]_relu_none_False_512/rnn_512_relu_1_False_eye_0.05/conv_[16, 16, 16]_relu_none/True/15000_0.001_0.001_0.01_0_0_128/seed0
    choices:
      rnn: leaky_rnn
      dataset: dddshapes
      model: rnnae
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
